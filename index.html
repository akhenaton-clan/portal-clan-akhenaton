<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Clan Akhenatón v2</title>
  
  <!-- Bootstrap 5 CSS via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Bootstrap Icons via CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .navbar-brand {
      font-weight: bold;
    }
    .card {
      border: none;
      border-radius: 10px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
    }
    .wizard-step {
      display: none;
    }
    .wizard-step.active {
      display: block;
    }
    .step-indicator {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #e9ecef;
      color: #6c757d;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin: 0 auto 10px;
    }
    .step-indicator.active {
      background-color: #0d6efd;
      color: white;
    }
    .step-indicator.completed {
      background-color: #198754;
      color: white;
    }
    .icon-option {
      cursor: pointer;
      border: 2px solid transparent;
      border-radius: 50%;
      padding: 5px;
      transition: all 0.2s ease;
    }
    .icon-option:hover {
      background-color: #e9ecef;
    }
    .icon-option.selected {
      border-color: #0d6efd;
      background-color: #e2eafc;
    }
    .profile-avatar-img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 50%;
    }
    .avatar-cell {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 50%;
    }
    .linear-scale-box {
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 8px;
    }
    .evaluation-card {
      border-left: 4px solid #0d6efd;
    }
  </style>
</head>
<body>

  <!-- NAVBAR (Se renderiza dinámicamente) -->
  <div id="navbar-container"></div>

  <!-- CONTENEDOR PRINCIPAL (Inyección dinámica de la SPA) -->
  <main class="container my-5 flex-grow-1" id="app"></main>

  <footer class="text-center py-4 bg-dark text-white-50 mt-auto" style="font-size: 0.85rem;">
    <div class="container">
      ⚜️ Portal Clan Akhenatón v2 — Arquitectura BaaS Desacoplada (Static GitHub Pages)
    </div>
  </footer>

  <!-- Bootstrap 5 Bundle JS (con Popper) via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JAVASCRIPT CLIENTE (ROUTER, STATE, VIEWS Y LLAMADAS BAAS) -->
  <script>
    // =========================================================================
    // ESTADO GLOBAL DE LA SPA (URL BaaS Fija como Constante)
    // =========================================================================
    const AppState = {
      webAppUrl: "https://script.google.com/macros/s/AKfycby6USAFuCulNXzOpjk3SphPUu5yGT8ONm7JufBf5E1e-0EZ9wj2kI7h6Gkws0NePhEX/exec", // URL BaaS Fija de Google Apps Script
      sessionEmail: localStorage.getItem("sessionEmail") || "", // Email del rover logueado
      sessionRoles: JSON.parse(localStorage.getItem("sessionRoles") || "[]"), // Roles
      sessionName: localStorage.getItem("sessionName") || "", // Nombre
      currentYear: new Date().getFullYear()
    };

    // =========================================================================
    // SERVICIO DE RED: COMUNICACIÓN HTTP (Fetch) CON GOOGLE APPS SCRIPT BAAS
    // =========================================================================
    async function callBaaS(action, params = {}) {
      const payload = {
        action: action,
        authEmail: AppState.sessionEmail,
        params: params
      };

      try {
        const response = await fetch(AppState.webAppUrl, {
          method: "POST",
          body: JSON.stringify(payload),
          mode: "cors"
        });

        if (!response.ok) {
          throw new Error(`Error HTTP: ${response.status}`);
        }

        const data = await response.json();
        if (data.success === false) {
          throw new Error(data.message);
        }
        return data;
      } catch (err) {
        console.error("callBaaS Error:", err.message);
        throw err;
      }
    }

    /**
     * Muestra una alerta temporal de Bootstrap en una sección específica.
     */
    function showSectionAlert(id, msg, type) {
      const el = document.getElementById(id);
      if (!el) {
        console.warn("showSectionAlert: Elemento con ID '" + id + "' no encontrado en el DOM activo.");
        return;
      }
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.classList.remove("d-none");
      // Desplazar suavemente hacia la alerta
      el.scrollIntoView({ behavior: "smooth", block: "nearest" });
      setTimeout(() => {
        // Verificar que el elemento siga existiendo antes de intentar ocultarlo
        const stillExists = document.getElementById(id);
        if (stillExists) stillExists.classList.add("d-none");
      }, 5000);
    }

    // =========================================================================
    // SISTEMA DE RUTEO POR HASHES
    // =========================================================================
    window.addEventListener("hashchange", router);
    window.addEventListener("load", function() {
      if (!AppState.sessionEmail) {
        window.location.hash = "#login";
      } else if (window.location.hash === "" || window.location.hash === "#") {
        window.location.hash = "#program";
      } else {
        router();
      }
    });

    function router() {
      const hash = window.location.hash || "#program";

      if (!AppState.sessionEmail && hash !== "#login") {
        window.location.hash = "#login";
        return;
      }

      renderNavbar(); // Asegurar navbar actualizado

      // Enrutamientos dinámicos
      if (hash === "#login") {
        renderLogin();
      } else if (hash === "#program") {
        renderProgram();
      } else if (hash.startsWith("#meeting/")) {
        const id = hash.split("/")[1];
        renderMeetingDetails(id);
      } else if (hash === "#create-meeting") {
        renderCreateMeeting();
      } else if (hash === "#asistencia") {
        renderAsistencia();
      } else if (hash === "#users") {
        renderManageUsers();
      } else if (hash.startsWith("#profile/")) {
        const email = decodeURIComponent(hash.split("/")[1]);
        renderProfile(email);
      } else if (hash === "#config") {
        renderManageConfig();
      } else {
        document.getElementById("app").innerHTML = `
          <div class="alert alert-warning text-center">
            <h4>Página no encontrada</h4>
            <p>La sección seleccionada no existe.</p>
            <a class="btn btn-primary" href="#program">Volver al Programa</a>
          </div>`;
      }
    }

    // =========================================================================
    // RENDER DE MENÚ DE NAVEGACIÓN (Navbar)
    // =========================================================================
    function renderNavbar() {
      const container = document.getElementById("navbar-container");
      if (!AppState.sessionEmail) {
        container.innerHTML = ""; // No mostrar navbar si no hay sesión
        return;
      }

      const isElevated = AppState.sessionRoles.indexOf("jefe") !== -1 || AppState.sessionRoles.indexOf("director") !== -1;

      container.innerHTML = `
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
          <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#program">
              <span class="me-2">⚜️</span>
              <span class="fw-bold">Clan Akhenatón v2</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
              <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-between" id="navbarNav">
              <ul class="navbar-nav">
                <li class="nav-item">
                  <a class="nav-link ${window.location.hash.startsWith('#program') ? 'active' : ''}" href="#program">📅 Programa</a>
                </li>
                ${isElevated ? `
                  <li class="nav-item">
                    <a class="nav-link ${window.location.hash === '#users' ? 'active' : ''}" href="#users">👥 Usuarios</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link ${window.location.hash === '#config' ? 'active' : ''}" href="#config">⚙️ Configuraciones</a>
                  </li>
                ` : ""}
              </ul>
              
              <div class="navbar-nav align-items-center">
                <span class="navbar-text me-3 text-light d-none d-lg-inline" style="font-size: 0.9rem;">
                  Hola, <strong class="text-white">${AppState.sessionName}</strong> 
                  <span class="badge bg-secondary ms-1" style="font-size: 0.75rem;">
                    ${AppState.sessionRoles.join('/')}
                  </span>
                </span>
                
                <a class="btn btn-outline-light btn-sm px-3" href="#profile/${encodeURIComponent(AppState.sessionEmail)}">
                  👤 Mi Perfil
                </a>
                <button class="btn btn-link text-white-50 btn-sm ms-2" onclick="logout()">Salir</button>
              </div>
            </div>
          </div>
        </nav>`;
    }

    function logout() {
      localStorage.removeItem("sessionEmail");
      localStorage.removeItem("sessionRoles");
      localStorage.removeItem("sessionName");
      AppState.sessionEmail = "";
      AppState.sessionRoles = [];
      AppState.sessionName = "";
      window.location.hash = "#login";
    }

    // =========================================================================
    // VISTA: INICIO DE SESIÓN (Login)
    // =========================================================================
    function renderLogin() {
      document.getElementById("app").innerHTML = `
        <div class="row justify-content-center my-5">
          <div class="col-md-6 col-lg-4">
            <div class="card p-4 text-center">
              <div class="card-body">
                <span class="fs-1">⚜️</span>
                <h3 class="fw-bold mt-2 text-dark">Clan Akhenatón</h3>
                <p class="text-muted small">BaaS & SPA Desacoplada v2</p>

                <div id="loginAlert" class="alert d-none text-start" role="alert"></div>

                <form onsubmit="login(event)">
                  <div class="mb-4 text-start">
                    <label class="form-label fw-semibold">Correo Electrónico</label>
                    <input type="email" class="form-control" id="loginEmail" required placeholder="rover@gmail.com">
                    <small class="text-muted small mt-1 d-block">Registrado en la base de datos de usuarios.</small>
                  </div>
                  <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="btnLogin">🔑 Ingresar</button>
                </form>
              </div>
            </div>
          </div>
        </div>`;
    }

    async function login(e) {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value.trim().toLowerCase();
      const btn = document.getElementById("btnLogin");
      const alertBox = document.getElementById("loginAlert");

      alertBox.classList.add("d-none");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Autenticando...`;

      try {
        const res = await callBaaS("login", { email: email });
        
        // Guardar sesión
        localStorage.setItem("sessionEmail", email);
        localStorage.setItem("sessionRoles", JSON.stringify(res.roles));
        localStorage.setItem("sessionName", res.nombre);

        AppState.sessionEmail = email;
        AppState.sessionRoles = res.roles;
        AppState.sessionName = res.nombre;

        window.location.hash = "#program";
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "🔑 Ingresar";
        alertBox.className = "alert alert-danger text-start";
        alertBox.textContent = "Error: " + err.message;
        alertBox.classList.remove("d-none");
      }
    }

    // =========================================================================
    // VISTA: CALENDARIO DE PROGRAMA (Dashboard)
    // =========================================================================
    function renderProgram() {
      document.getElementById("app").innerHTML = `
        <div class="row mb-4 align-items-center justify-content-between">
          <div class="col-12 col-md-6">
            <h2 class="fw-bold">📅 Calendario del Programa</h2>
            <p class="text-muted">Planificación del clan gestionada en Sheets y renderizada de forma estática.</p>
          </div>
          <div class="col-12 col-md-6 text-md-end">
            <div class="d-flex gap-2 justify-content-md-end flex-wrap">
              <a class="btn btn-primary d-inline-flex align-items-center gap-2" href="#asistencia">
                ✍️ Registrar Asistencia
              </a>
              ${AppState.sessionRoles.indexOf("director") !== -1 ? `
                <a class="btn btn-success d-inline-flex align-items-center gap-2" href="#create-meeting">
                  ➕ Crear Reunión
                </a>
              ` : ""}
            </div>
          </div>
        </div>

        <!-- FILTROS -->
        <div class="card mb-4 p-3">
          <div class="row g-3 align-items-center">
            <div class="col-md-3">
              <label class="form-label fw-semibold mb-1" style="font-size:0.9rem;">Filtrar por Año</label>
              <select class="form-select" id="filterYear" onchange="loadCalendar()">
                <option value="2026" ${AppState.currentYear === 2026 ? "selected" : ""}>2026</option>
                <option value="2025" ${AppState.currentYear === 2025 ? "selected" : ""}>2025</option>
                <option value="2024" ${AppState.currentYear === 2024 ? "selected" : ""}>2024</option>
              </select>
            </div>
            <div class="col-md-5 d-flex align-items-end h-100 pb-1">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="myMeetingsOnly" onchange="filterLocalMeetings()">
                <label class="form-check-label fw-semibold text-dark" style="cursor:pointer;" for="myMeetingsOnly">
                  🙋 Mostrar solo mis reuniones (como Encargado)
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- TABLA DE CALENDARIO -->
        <div class="card">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 text-start">
              <thead class="table-light">
                <tr>
                  <th scope="col" style="width: 125px;">Mes</th>
                  <th scope="col" style="width: 80px;" class="text-center">Día</th>
                  <th scope="col">Reunión</th>
                  <th scope="col">Objetivo</th>
                  <th scope="col">Encargados</th>
                  <th scope="col" style="width: 100px;" class="text-center">¿Salida?</th>
                  <th scope="col">Observación</th>
                </tr>
              </thead>
              <tbody id="calendarTableBody">
                <tr>
                  <td colspan="7" class="text-center py-4 text-muted">
                    <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                    Conectando con BaaS...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>`;

      loadCalendar();
    }

    let originalMeetingsList = [];

    async function loadCalendar() {
      const year = document.getElementById("filterYear").value;
      const tbody = document.getElementById("calendarTableBody");

      try {
        const res = await callBaaS("getMeetings", { year: year });
        
        // Guard de protección de navegación rápida de SPA
        const currentTbody = document.getElementById("calendarTableBody");
        if (!currentTbody) return;

        originalMeetingsList = res.data;
        renderCalendarRows(res.data);
      } catch (err) {
        const currentTbody = document.getElementById("calendarTableBody");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">Error BaaS: ${err.message}</td></tr>`;
        }
      }
    }

    function renderCalendarRows(list) {
      const tbody = document.getElementById("calendarTableBody");
      if (!tbody) return;

      tbody.innerHTML = "";

      if (list.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No se registran actividades programadas para este año.</td></tr>`;
        return;
      }

      list.forEach(r => {
        const tr = document.createElement("tr");
        tr.style.cursor = "pointer";
        tr.onclick = function() { window.location.hash = `#meeting/${r.id}`; };

        let mesClass = "bg-secondary";
        const cleanMes = r.mes.toUpperCase();
        if (["ENERO","FEBRERO","MARZO"].includes(cleanMes)) mesClass = "bg-dark bg-opacity-75";
        if (["ABRIL","MAYO","JUNIO"].includes(cleanMes)) mesClass = "bg-primary";
        if (["JULIO","AGOSTO","SEPTIEMBRE"].includes(cleanMes)) mesClass = "bg-success";
        if (["OCTUBRE","NOVIEMBRE","DICIEMBRE"].includes(cleanMes)) mesClass = "bg-warning text-dark";

        tr.innerHTML = `
          <td><span class="badge ${mesClass} px-2 py-1 w-100 text-uppercase" style="font-size:0.75rem;">${r.mes}</span></td>
          <td class="fw-bold fs-5 text-center text-dark">${r.dia}</td>
          <td>
            <div class="fw-bold text-primary" style="font-size:0.98rem;">${r.nombre}</div>
            <small class="text-muted">${r.tipo.toUpperCase()}</small>
          </td>
          <td class="text-muted small text-truncate" style="max-width: 250px;">${r.objetivo || '<i>Sin definir</i>'}</td>
          <td><span class="badge bg-light text-dark border border-secondary px-2 py-1" style="font-size:0.8rem;">${r.encargadosApodos}</span></td>
          <td class="text-center">${r.esSalida === "SÍ" ? `<span class="text-success fw-bold">SÍ</span>` : `<span class="text-danger fw-bold">NO</span>`}</td>
          <td class="text-muted small text-truncate" style="max-width: 200px;">${r.observacion || '<i>Sin definir</i>'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function filterLocalMeetings() {
      const myOnly = document.getElementById("myMeetingsOnly").checked;
      if (myOnly) {
        const filtered = originalMeetingsList.filter(r => {
          return r.encargados.some(correo => correo.trim().toLowerCase() === AppState.sessionEmail);
        });
        renderCalendarRows(filtered);
      } else {
        renderCalendarRows(originalMeetingsList);
      }
    }

    // =========================================================================
    // VISTA: DETALLE DE REUNIÓN
    // =========================================================================
    let meetingDetails = null;

    function renderMeetingDetails(id) {
      document.getElementById("app").innerHTML = `
        <div class="d-flex align-items-center gap-3 border-bottom pb-3 mb-4 flex-wrap justify-content-between">
          <div class="d-flex align-items-center gap-3">
            <a class="btn btn-outline-secondary btn-sm" href="#program">⬅️ Volver al Programa</a>
            <h2 class="fw-bold mb-0" id="headerMeetingName">Cargando...</h2>
          </div>
          <div class="d-flex gap-2">
            <button id="btnEditMeeting" class="btn btn-primary d-none" onclick="openEditModal()">✏️ Editar</button>
            <button id="btnDeleteMeeting" class="btn btn-danger d-none" onclick="deleteMeeting()">🗑️ Eliminar</button>
          </div>
        </div>

        <div id="loader" class="text-center py-5">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Cargando detalles de la reunión...</p>
        </div>

        <div id="meetingContent" class="d-none">
          <div class="row g-4">
            <div class="col-lg-8">
              <div class="card p-4 mb-4">
                <h4 class="fw-bold text-dark border-bottom pb-2 mb-3">Información General</h4>
                <div class="row g-3">
                  <div class="col-md-6">
                    <span class="text-muted d-block small fw-semibold">Número Único:</span>
                    <span id="txtNumeroUnico" class="fw-bold fs-5 text-primary">--</span>
                  </div>
                  <div class="col-md-6">
                    <span class="text-muted d-block small fw-semibold">Tipo de Actividad:</span>
                    <span id="txtTipo" class="badge bg-secondary fs-6 text-uppercase">--</span>
                  </div>
                  <div class="col-md-6">
                    <span class="text-muted d-block small fw-semibold">Fecha:</span>
                    <span id="txtFecha" class="fw-bold text-dark">--</span>
                  </div>
                  <div class="col-md-6" id="txtFechaFinGroup">
                    <span class="text-muted d-block small fw-semibold">Fecha Fin:</span>
                    <span id="txtFechaFin" class="fw-bold text-dark">--</span>
                  </div>
                  <div class="col-12">
                    <span class="text-muted d-block small fw-semibold">Lugar:</span>
                    <span id="txtLugar" class="fw-bold text-dark">--</span>
                  </div>
                  <div class="col-12 mt-3 border-top pt-2">
                    <span class="text-muted d-block small fw-semibold">Objetivo:</span>
                    <p id="txtObjetivo" class="text-dark mb-0" style="white-space: pre-wrap;">--</p>
                  </div>
                  <div class="col-12 mt-3 border-top pt-2">
                    <span class="text-muted d-block small fw-semibold">Observación:</span>
                    <p id="txtObservacion" class="text-dark mb-0" style="white-space: pre-wrap;">--</p>
                  </div>
                </div>
              </div>

              <!-- DOCUMENTACIÓN EN DRIVE / ENLACES ASOCIADOS -->
              <div id="cardDocuments" class="card p-4 mb-4 d-none">
                <h4 class="fw-bold text-dark border-bottom pb-2 mb-3">📁 Documentación del Programa</h4>
                <div class="row g-3">
                  <div class="col-md-6">
                    <div class="p-3 border rounded bg-light d-flex flex-column h-100 justify-content-between">
                      <div>
                        <h6 class="fw-bold text-dark mb-1">📄 Formato de Programa</h6>
                        <small class="text-muted d-block mb-3">Google Docs creado automáticamente.</small>
                      </div>
                      <div class="d-flex gap-2">
                        <a id="btnDocFormato" href="#" target="_blank" class="btn btn-outline-primary btn-sm flex-grow-1">Abrir Doc</a>
                        <a id="btnFolderFormato" href="#" target="_blank" class="btn btn-outline-secondary btn-sm">📁 Carpeta</a>
                      </div>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="p-3 border rounded bg-light d-flex flex-column h-100 justify-content-between">
                      <div>
                        <h6 class="fw-bold text-dark mb-1">📋 Acta de Reunión</h6>
                        <small class="text-muted d-block mb-3">Google Docs de seguimiento.</small>
                      </div>
                      <div class="d-flex gap-2">
                        <a id="btnDocActa" href="#" target="_blank" class="btn btn-outline-primary btn-sm flex-grow-1">Abrir Doc</a>
                        <a id="btnFolderActa" href="#" target="_blank" class="btn btn-outline-secondary btn-sm">📁 Carpeta</a>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <!-- EVALUACIONES -->
              <div id="cardEvaluations" class="card p-4 d-none">
                <div class="d-flex align-items-center justify-content-between border-bottom pb-2 mb-3">
                  <h4 class="fw-bold text-dark mb-0">💬 Evaluaciones de la Reunión</h4>
                  <span id="evalCounter" class="badge bg-primary fs-6">0 reportes</span>
                </div>
                <div id="evaluationsContainer" class="row g-3"></div>
              </div>
            </div>

            <!-- ENCARGADOS Y METADATA -->
            <div class="col-lg-4">
              <div class="card p-4 mb-4">
                <h5 class="fw-bold text-dark border-bottom pb-2 mb-3">Encargados (Rovers)</h5>
                <ul id="listEncargados" class="list-group list-group-flush text-start"></ul>
              </div>
              <div class="card p-4">
                <h5 class="fw-bold text-dark border-bottom pb-2 mb-3">Estructura Scout</h5>
                <div class="mb-3">

    async function loadMeetingDetails(id) {
      try {
        const res = await callBaaS("getMeetingDetails", { id: id });
        
        // Guard de protección de navegación rápida de SPA
        const currentLoader = document.getElementById("loader");
        if (!currentLoader) return;

        meetingDetails = res.data;

        document.getElementById("headerMeetingName").textContent = meetingDetails.nombre;
        document.getElementById("txtNumeroUnico").textContent = "# " + meetingDetails.numeroUnico;
        document.getElementById("txtTipo").textContent = meetingDetails.tipo;
        
        const fStart = new Date(meetingDetails.fecha + "T00:00:00");
        document.getElementById("txtFecha").textContent = fStart.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        
        if (meetingDetails.tipo === "campamento" && meetingDetails.fechaFin) {
          const fEnd = new Date(meetingDetails.fechaFin + "T00:00:00");
          document.getElementById("txtFechaFin").textContent = fEnd.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
          document.getElementById("txtFechaFinGroup").style.display = "block";
        } else {
          document.getElementById("txtFechaFinGroup").style.display = "none";
        }

        document.getElementById("txtLugar").textContent = meetingDetails.lugar;
        document.getElementById("txtObjetivo").textContent = meetingDetails.objetivo || "Sin objetivo registrado.";
        document.getElementById("txtObservacion").textContent = meetingDetails.observacion || "Sin observaciones.";

        // Encargados
        const listEnc = document.getElementById("listEncargados");
        listEnc.innerHTML = meetingDetails.encargadosDetalle.map(enc => `
          <li class="list-group-item d-flex align-items-center gap-2 px-0">
            <span>⚜️</span> <strong class="text-dark">${enc}</strong>
          </li>
        `).join("");

        // Badges
        document.getElementById("badgesPilares").innerHTML = meetingDetails.pilares.length > 0
          ? meetingDetails.pilares.map(p => `<span class="badge bg-primary me-1 px-2 py-1 mb-1">${p}</span>`).join("")
          : `<span class="text-muted small">Ninguno registrado</span>`;

        document.getElementById("badgesRutas").innerHTML = meetingDetails.rutas.length > 0
          ? meetingDetails.rutas.map(r => `<span class="badge bg-info text-dark me-1 px-2 py-1 mb-1">${r}</span>`).join("")
          : `<span class="text-muted small">Ninguna registrada</span>`;

        // Botones condicionales
        if (meetingDetails.canEdit) document.getElementById("btnEditMeeting").classList.remove("d-none");
        if (meetingDetails.canDelete) document.getElementById("btnDeleteMeeting").classList.remove("d-none");

        if (meetingDetails.canAccessDocs) {
          document.getElementById("btnDocFormato").href = meetingDetails.documentoFormatoUrl;
          document.getElementById("btnFolderFormato").href = meetingDetails.carpetaFormatosUrl;
          document.getElementById("btnDocActa").href = meetingDetails.documentoActaUrl;
          document.getElementById("btnFolderActa").href = meetingDetails.carpetaActasUrl;
          
          document.getElementById("cardDocuments").classList.remove("d-none");
          document.getElementById("cardEvaluations").classList.remove("d-none");
          loadEvaluations(id);
        }

        document.getElementById("loader").classList.add("d-none");
        document.getElementById("meetingContent").classList.remove("d-none");
      } catch (err) {
        const currentLoader = document.getElementById("loader");
        if (currentLoader) {
          currentLoader.innerHTML = `
            <div class="alert alert-danger">
              <h4 class="fw-bold">Error</h4>
              <p>${err.message}</p>
              <a class="btn btn-outline-danger mt-2" href="#program">Volver al Calendario</a>
            </div>`;
        }
      }
    }

    async function loadEvaluations(reunionId) {
      const container = document.getElementById("evaluationsContainer");
      if (!container) return;

      const counter = document.getElementById("evalCounter");
      container.innerHTML = `<div class="col-12 text-center text-muted">Cargando evaluaciones...</div>`;

      try {
        const res = await callBaaS("getMeetingEvaluations", { reunionId: reunionId });
        
        // Guard de SPA
        const currentContainer = document.getElementById("evaluationsContainer");
        if (!currentContainer) return;

        counter.textContent = res.data.length + (res.data.length === 1 ? " reporte" : " reportes");

        if (res.data.length === 0) {
          currentContainer.innerHTML = `<div class="col-12 text-center py-4 text-muted border rounded bg-white">Ningún reporte registrado aún.</div>`;
          return;
        }

        currentContainer.innerHTML = res.data.map(ev => `
          <div class="col-md-6">
            <div class="card p-3 evaluation-card shadow-sm h-100">
              <h6 class="fw-bold text-dark border-bottom pb-1 mb-2">👤 ${ev.nombreAsistente}</h6>
              <div class="row g-2 text-start">
                <div class="col-12">
                  <strong class="text-muted small d-block">Antes:</strong>
                  <p class="mb-2 text-muted small" style="white-space: pre-wrap;">${ev.antes}</p>
                </div>
                <div class="col-12">
                  <strong class="text-muted small d-block">Durante:</strong>
                  <p class="mb-2 text-muted small" style="white-space: pre-wrap;">${ev.durante}</p>
                </div>
                <div class="col-12">
                  <strong class="text-muted small d-block">Después:</strong>
                  <p class="mb-0 text-muted small" style="white-space: pre-wrap;">${ev.despues}</p>
                </div>
              </div>
            </div>
          </div>
        `).join("");
      } catch (err) {
        const currentContainer = document.getElementById("evaluationsContainer");
        if (currentContainer) {
          currentContainer.innerHTML = `<div class="col-12 text-center text-danger">Error: ${err.message}</div>`;
        }
      }
    }

    function toggleLugarInEdit() {
      const tipo = document.getElementById("editTipo").value;
      const lugar = document.getElementById("editLugar");
      if (tipo === "reunión") {
        lugar.value = "I.E. Santa Rosa de Lima";
        lugar.disabled = true;
      } else {
        lugar.disabled = false;
      }

    async function saveMeeting(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmitEdit");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      const pilares = Array.from(document.querySelectorAll(".edit-pilar-check:checked")).map(cb => cb.value);
      const rutas = Array.from(document.querySelectorAll(".edit-ruta-check:checked")).map(cb => cb.value);
      
      let encargados = [];
      if (meetingDetails.fullControl) {
        encargados = Array.from(document.querySelectorAll(".edit-rover-check:checked")).map(cb => cb.value);
      } else {
        encargados = meetingDetails.encargados;
      }

      const input = {
        nombre: document.getElementById("editNombre").value.trim(),
        text: document.getElementById("editNombre").value.trim(),
        objetivo: document.getElementById("editObjetivo").value,
        observacion: document.getElementById("editObservacion").value,
        pilares: pilares,
        rutas: rutas,
        encargados: encargados,
        fecha: document.getElementById("editFecha").value,
        tipo: document.getElementById("editTipo").value,
        lugar: document.getElementById("editLugar").value
      };

      try {
        await callBaaS("updateMeeting", { id: meetingDetails.id, reunionInput: input });
        
        const editModal = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalEdit"));
        editModal.hide();
        loadMeetingDetails(meetingDetails.id);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Guardar Cambios";
        alert("Fallo al guardar: " + err.message);
      }
    }

    async function loadWizardData() {
      try {
        const meetings = await callBaaS("getActiveMeetings");
        const users = await callBaaS("getAllUsersPlain");
        const configs = await callBaaS("getRutasYCompetencias");

        // Guard de SPA
        const selU = document.getElementById("selectUsuario");
        if (!selU) return;

        activeMeetings = meetings.data;
        usersPlain = users.data;
        wizardRutas = configs.rutas;
        wizardCompetencias = configs.competencias;

        // Poblar integrantes
        selU.innerHTML = `<option value="" disabled>Selecciona al integrante...</option>` +
          usersPlain.map(u => `<option value="${u.correo}" ${u.correo === AppState.sessionEmail ? "selected" : ""}>${u.nombreCompleto} (${u.apodo})</option>`).join("");

        // Poblar reuniones
        const selM = document.getElementById("selectReunion");
        if (activeMeetings.length === 0) {
          selM.innerHTML = `<option value="" disabled selected>No hay reuniones pasadas disponibles.</option>`;
        } else {
          selM.innerHTML = `<option value="" disabled selected>Selecciona la sesión...</option>` +
            activeMeetings.map(m => `<option value="${m.id}">[#${m.id}] ${m.fechaFormatted} - ${m.nombre}</option>`).join("");
        }

        // Checkboxes Rutas
        document.getElementById("wizardRutasC").innerHTML = wizardRutas.map((r, idx) => `
          <div class="form-check text-start">
            <input class="form-check-input wizard-ruta-check" type="checkbox" value="${r.nombre}" id="wRut_${idx}" onchange="onWizardRutasToggled()">
            <label class="form-check-label small" for="wRut_${idx}"><strong>${r.nombre}</strong></label>
          </div>
        `).join("");

      } catch (err) {
        alert("BaaS Error: " + err.message);
      }
    }

    function onWizardMeetingSelected() {
      const id = document.getElementById("selectReunion").value;
      const m = activeMeetings.find(meet => meet.id == id);
      if (m) {
        document.getElementById("bannerMeetingName").textContent = m.nombre;
        document.getElementById("bannerMeetingObjective").textContent = m.objetivo;
      }
    }

    function onWizardRutasToggled() {
      const checkedRutas = Array.from(document.querySelectorAll(".wizard-ruta-check:checked")).map(cb => cb.value);
      const msg = document.getElementById("noRutasWizardMsg");
      const compC = document.getElementById("wizardCompsC");

      if (checkedRutas.length === 0) {
        msg.classList.remove("d-none");
        compC.classList.add("d-none");
        compC.innerHTML = "";
        onWizardCompsToggled();
        return;
      }

      msg.classList.add("d-none");
      compC.classList.remove("d-none");

      const filtered = wizardCompetencias.filter(c => checkedRutas.includes(c.ruta));
      compC.innerHTML = filtered.map((c, idx) => `
        <div class="form-check mb-1 text-start">
          <input class="form-check-input wizard-comp-check" type="checkbox" value="${c.nombre}" id="wComp_${idx}" onchange="onWizardCompsToggled()">
          <label class="form-check-label small" for="wComp_${idx}"><strong>${c.nombre}</strong> <span class="badge bg-secondary" style="font-size:0.6rem;">${c.ruta}</span></label>
        </div>
      `).join("");
    }

    function onWizardCompsToggled() {
      const checkedComps = Array.from(document.querySelectorAll(".wizard-comp-check:checked")).map(cb => cb.value);
      const section = document.getElementById("sectionNiveles");
      const container = document.getElementById("wizardNivelesC");

      if (checkedComps.length === 0) {
        section.classList.add("d-none");
        container.innerHTML = "";
        return;
      }

      section.classList.remove("d-none");
      container.innerHTML = checkedComps.map((cName, idx) => `
        <div class="linear-scale-box text-center p-3 border rounded">
          <label class="form-label fw-bold d-block small mb-2">Nivel en: <span class="text-primary">${cName}</span></label>
          <div class="d-flex justify-content-center gap-2 align-items-center flex-wrap">
            <span class="text-muted small">Nivel 1</span>
            <div class="btn-group" role="group">
              ${[1,2,3,4,5].map(v => `
                <input type="radio" class="btn-check wizard-level-radio" name="wLvl_${idx}" id="wLvl_${idx}_${v}" value="${v}" data-comp="${cName}" ${v === 3 ? "checked" : ""}>
                <label class="btn btn-outline-success px-3 fw-bold btn-sm" for="wLvl_${idx}_${v}">${v}</label>
              `).join("")}
            </div>

        </div>
      `).join("");

    let wizardCurrentStep = 1;

    function goToStep(step) {
      document.getElementById("wizardAlert").classList.add("d-none");
      
      if (wizardCurrentStep === 1 && step === 2) {
        const u = document.getElementById("selectUsuario").value;
        const r = document.getElementById("selectReunion").value;
        if (!u || !r) {
          showWizardError("Selecciona el Integrante y la Reunión.");
          return;
        }
      }

      if (wizardCurrentStep === 2 && step === 3) {
        const antes = document.getElementById("areaAntes").value.trim();
        const durante = document.getElementById("areaDurante").value.trim();
        const despues = document.getElementById("areaDespues").value.trim();
        if (!antes && !durante && !despues) {
          showWizardError("La sección de Evaluación requiere completar al menos uno de los tres campos.");
          return;
        }
      }

      document.getElementById("step_" + wizardCurrentStep).classList.remove("active");
      document.getElementById("step_" + step).classList.add("active");

      document.getElementById("ind_" + wizardCurrentStep).classList.remove("active");
      document.getElementById("title_" + wizardCurrentStep).classList.remove("active");
      if (step > wizardCurrentStep) {
        document.getElementById("ind_" + wizardCurrentStep).classList.add("completed");
      }

      document.getElementById("ind_" + step).classList.add("active");
      document.getElementById("title_" + step).classList.add("active");

      wizardCurrentStep = step;
      window.scrollTo(0, 0);
    }

    function showWizardError(msg) {
      const err = document.getElementById("wizardAlert");
      err.textContent = msg;
      err.classList.remove("d-none");
      window.scrollTo(0, 0);
    }

    async function saveAttendance(e) {
      e.preventDefault();
      document.getElementById("wizardAlert").classList.add("d-none");

      const hiciste = document.getElementById("inputHiciste").value.trim();
      const aprendiste = document.getElementById("inputAprendiste").value.trim();
      const demostracion = document.getElementById("inputDemostracion").value.trim();
      
      const rutas = Array.from(document.querySelectorAll(".wizard-ruta-check:checked")).map(cb => cb.value);
      const competencias = Array.from(document.querySelectorAll(".wizard-comp-check:checked")).map(cb => cb.value);
      const autoevaluacion = document.querySelector("input[name='radioAuto']:checked").value;

      if (!hiciste || !aprendiste || !demostracion || rutas.length === 0 || competencias.length === 0) {
        showWizardError("Rellena todos los campos obligatorios (*).");
        return;
      }

      const nivelesCompetencias = {};
      document.querySelectorAll(".wizard-level-radio:checked").forEach(radio => {
        const cName = radio.getAttribute("data-comp");
        nivelesCompetencias[cName] = parseInt(radio.value, 10);
      });

      const btn = document.getElementById("btnSubmitWizard");
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Registrando...`;

      const input = {
        correoUsuario: document.getElementById("selectUsuario").value,
        reunionId: parseInt(document.getElementById("selectReunion").value, 10),
        antes: document.getElementById("areaAntes").value,
        durante: document.getElementById("areaDurante").value,
        despues: document.getElementById("areaDespues").value,
        queHicisteHoy: hiciste,
        queAprendisteHoy: aprendiste,
        rutasTrabajadas: rutas,
        competenciasTrabajadas: competencias,
        nivelesCompetencias: nivelesCompetencias,
        demostracionNivel: demostracion,
        autoevaluacion: parseInt(autoevaluacion, 10)
      };

      try {
        await callBaaS("submitAttendance", { attendanceInput: input });
        document.getElementById("attendanceWizard").classList.add("d-none");
        document.getElementById("wizardHeader").classList.add("d-none");
        document.getElementById("successWizard").classList.remove("d-none");
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "💾 Guardar Registro";
        showWizardError("Fallo al registrar: " + err.message);
      }
    }

    async function loadUsers() {
      const tbody = document.getElementById("usersTableBody");
      if (!tbody) return;

      try {
        const res = await callBaaS("getUsers");
        
        // Guard de SPA
        const currentTbody = document.getElementById("usersTableBody");
        if (!currentTbody) return;

        usersList = res.data;
        currentTbody.innerHTML = "";

        if (usersList.length === 0) {
          currentTbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-muted">No hay integrantes registrados.</td></tr>`;
          return;
        }

        usersList.forEach(u => {
          const tr = document.createElement("tr");
          const avatar = u.fotoPerfil || "https://via.placeholder.com/45?text=" + encodeURIComponent(u.apodo);
          const roles = u.roles.map(r => {
            let cl = "bg-secondary";
            if (r === "rover") cl = "bg-info text-dark";
            if (r === "jefe") cl = "bg-primary";
            if (r === "director") cl = "bg-success";
            return `<span class="badge ${cl} me-1 text-uppercase">${r}</span>`;
          }).join("");

          tr.innerHTML = `
            <td><img src="${avatar}" class="avatar-cell shadow-sm border" alt="Avatar"></td>
            <td><strong class="text-dark">${u.nombreCompleto}</strong></td>
            <td class="text-secondary">${u.correo}</td>
            <td>${roles}</td>
            <td class="text-end">
              <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-dark btn-sm" onclick="openEditUserModal('${u.correo}')">Editar</button>
                <a class="btn btn-outline-primary btn-sm" href="#profile/${encodeURIComponent(u.correo)}">Perfil</a>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteUser('${u.correo}')">Eliminar</button>
              </div>
            </td>`;
          currentTbody.appendChild(tr);
        });
      } catch (err) {
        const currentTbody = document.getElementById("usersTableBody");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

    function openCreateUserModal() {
      isEditing = false;
      document.getElementById("modalUserLabel").textContent = "👤 Registrar Integrante";
      document.getElementById("modalEmail").value = "";
      document.getElementById("modalEmail").readOnly = false;
      document.getElementById("modalNombre").value = "";
      document.getElementById("modalUserAlert").classList.add("d-none");
      document.querySelectorAll(".role-check").forEach(cb => cb.checked = false);

      const modalUser = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalUser"));
      modalUser.show();
    }

    function openEditUserModal(email) {
      const u = usersList.find(user => user.correo === email);
      if (!u) return;

      isEditing = true;
      document.getElementById("modalUserLabel").textContent = "👤 Editar Integrante";
      document.getElementById("modalEmail").value = u.correo;
      document.getElementById("modalEmail").readOnly = true;
      document.getElementById("modalNombre").value = u.nombreCompleto;
      document.getElementById("modalUserAlert").classList.add("d-none");
      
      document.querySelectorAll(".role-check").forEach(cb => {
        cb.checked = u.roles.includes(cb.value);
      });

      const modalUser = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalUser"));
      modalUser.show();
    }

    async function saveUser(e) {
      e.preventDefault();
      const email = document.getElementById("modalEmail").value.trim().toLowerCase();
      const nombre = document.getElementById("modalNombre").value.trim();
      const roles = Array.from(document.querySelectorAll(".role-check:checked")).map(cb => cb.value);

      if (roles.length === 0) {
        const alert = document.getElementById("modalUserAlert");
        alert.textContent = "Error: Debes asignar al menos un rol.";
        alert.classList.remove("d-none");
        return;
      }

      const btn = document.getElementById("btnSubmitUser");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        const res = await callBaaS("saveUserRoles", {
          email: email,
          profileInput: { nombreCompleto: nombre, roles: roles }
        });
        
        const modalUser = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalUser"));
        modalUser.hide();
        loadUsers();
        alert(res.message);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = "Guardar Integrante";
        const alert = document.getElementById("modalUserAlert");
        alert.textContent = "Error: " + err.message;
        alert.classList.remove("d-none");
      }
    }

    async function loadProfile(email) {
      try {
        const configs = await callBaaS("getRutasYCompetencias");
        profileRutasMaster = configs.rutas;
        profileCompsMaster = configs.competencias;

        const res = await callBaaS("getUserData", { email: email });
        
        // Guard de SPA
        const currentLoader = document.getElementById("profileLoader");
        if (!currentLoader) return;

        localProfileUser = res.data;

        document.getElementById("profEmail").value = localProfileUser.correo;
        document.getElementById("profNombre").value = localProfileUser.nombreCompleto;
        document.getElementById("profApodo").value = localProfileUser.apodo;
        document.getElementById("profNacimiento").value = localProfileUser.fechaNacimiento;

        // Avatar
        const avatar = localProfileUser.fotoPerfil || "https://via.placeholder.com/120?text=" + encodeURIComponent(localProfileUser.apodo);
        document.getElementById("profileAvatar").src = avatar;
        selectIcon(localProfileUser.icono || "user");

        // Plan de Adelanto condicional
        if (localProfileUser.esRover && localProfileUser.tieneAccAccessAdelanto || (localProfileUser.esRover && localProfileUser.tieneAccesoAdelanto)) {
          renderPlanAdelantoForm(localProfileUser);
          document.getElementById("sectionPlanAdelanto").classList.remove("d-none");
        }

        // Cargar tabla histórica de asistencias
        loadHistoricalAssistances(email);

        currentLoader.classList.add("d-none");
        document.getElementById("profileContent").classList.remove("d-none");

      } catch (err) {
        const currentLoader = document.getElementById("profileLoader");
        if (currentLoader) {
          currentLoader.innerHTML = `<div class="alert alert-danger text-start">Fallo al conectar con BaaS: ${err.message}</div>`;
        }
      }
    }

    function selectIcon(iconName) {
      profileSelectedIcon = iconName;
      document.querySelectorAll(".icon-option").forEach(el => {
        el.classList.remove("selected");
        if (el.getAttribute("data-icon") === iconName) el.classList.add("selected");
      });
    }

    async function saveProfileDetails(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSaveProfile");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      const input = {
        correo: localProfileUser.correo,
        nombreCompleto: document.getElementById("profNombre").value.trim(),
        apodo: document.getElementById("profApodo").value.trim(),
        fechaNacimiento: document.getElementById("profNacimiento").value,
        icono: profileSelectedIcon
      };

      try {
        const res = await callBaaS("saveProfile", { profileInput: input });
        showSectionAlert("profileAlert", res.message, "success");
      } catch (err) {
        showSectionAlert("profileAlert", err.message, "danger");
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar Perfil";
      }
    }

    async function uploadProfilePhoto() {
      const input = document.getElementById("filePhoto");
      if (input.files.length === 0) {
        alert("Selecciona un archivo primero.");
        return;
      }

      const btn = document.getElementById("btnUploadPhoto");
      btn.disabled = true;
      btn.textContent = "Subiendo...";

      const file = input.files[0];
      const reader = new FileReader();
      reader.onload = async function(e) {
        try {
          const res = await callBaaS("uploadProfilePhoto", {
            base64Data: e.target.result,
            fileName: file.name,
            targetEmail: localProfileUser.correo
          });
          document.getElementById("profileAvatar").src = res.fotoPerfil;
          input.value = "";
          alert("¡Foto de perfil actualizada!");
        } catch (err) {
          alert("Error: " + err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = "Subir Foto";
        }
      };
      reader.readAsDataURL(file);
    }

    function renderPlanAdelantoForm(data) {
      document.getElementById("inputIngreso").value = data.fechaIngreso;
      document.getElementById("inputSalida").value = data.fechaSalida;
      document.getElementById("inputObtencionRS").value = data.fechaObtencionRS;
      document.getElementById("inputObtencionRL").value = data.fechaObtencionRL;
      document.getElementById("inputObtencionBP").value = data.fechaObtencionBP;

      // Rutas
      const rutasC = document.getElementById("rutasPlanContainer");
      rutasC.innerHTML = profileRutasMaster.map((r, idx) => {
        const isGanada = data.rutasGanadas[r.nombre] ? data.rutasGanadas[r.nombre].ganada : false;
        const fEntrega = data.rutasGanadas[r.nombre] ? data.rutasGanadas[r.nombre].fechaEntrega || "" : "";
        return `
          <div class="col-md-6 border rounded p-3 bg-light bg-opacity-50 mb-2">
            <div class="form-check form-switch mb-2">
              <input class="form-check-input profile-ruta-switch" type="checkbox" id="pRut_${idx}" data-ruta="${r.nombre}" ${isGanada ? "checked" : ""} onchange="toggleProfileRutaDate(${idx})">
              <label class="form-check-label fw-bold text-dark" for="pRut_${idx}">${r.nombre}</label>
            </div>
            <div class="row g-2 align-items-center ${isGanada ? "" : "d-none"}" id="pRutDateGroup_${idx}">
              <div class="col-auto"><small class="fw-semibold">Fecha:</small></div>
              <div class="col"><input type="date" class="form-control form-control-sm profile-ruta-date" id="pRutDate_${idx}" value="${fEntrega}"></div>
            </div>
          </div>`;
      }).join("");

      // Competencias
      const compsC = document.getElementById("competenciasPlanContainer");
      compsC.innerHTML = profileCompsMaster.map((c, idx) => {
        const currentLvl = data.competenciasNivel[c.nombre] || 1;
        return `
          <div class="col-md-6 border-bottom py-2">
            <div class="row align-items-center">
              <div class="col">
                <strong class="text-dark small d-block">${c.nombre}</strong>
                <span class="badge bg-secondary" style="font-size:0.6rem;">${c.ruta}</span>
              </div>
              <div class="col-auto">
                <select class="form-select form-select-sm profile-comp-select" data-comp="${c.nombre}" style="width: 100px;">
                  ${[1,2,3,4,5].map(v => `<option value="${v}" ${currentLvl === v ? "selected" : ""}>Nivel ${v}</option>`).join("")}
                </select>
              </div>
            </div>
          </div>`;
      }).join("");
    }

    function toggleProfileRutaDate(idx) {
      const sw = document.getElementById("pRut_" + idx);
      const grp = document.getElementById("pRutDateGroup_" + idx);
      if (sw.checked) grp.classList.remove("d-none");
      else { grp.classList.add("d-none"); document.getElementById("pRutDate_" + idx).value = ""; }
    }

    async function savePlanAdelanto(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSavePlan");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      const rutasGanadas = {};
      document.querySelectorAll(".profile-ruta-switch").forEach((sw, idx) => {
        const rName = sw.getAttribute("data-ruta");
        const fEntrega = document.getElementById("pRutDate_" + idx).value;
        rutasGanadas[rName] = { ganada: sw.checked, fechaEntrega: fEntrega || null };
      });

      const competenciesNivel = {};
      document.querySelectorAll(".profile-comp-select").forEach(sel => {
        const cName = sel.getAttribute("data-comp");
        competenciesNivel[cName] = parseInt(sel.value, 10);
      });

      const input = {
        fechaIngreso: document.getElementById("inputIngreso").value,
        fechaSalida: document.getElementById("inputSalida").value,
        fechaObtencionRS: document.getElementById("inputObtencionRS").value,
        fechaObtencionRL: document.getElementById("inputObtencionRL").value,
        fechaObtencionBP: document.getElementById("inputObtencionBP").value,
        rutasGanadas: rutasGanadas,
        competenciasNivel: competenciesNivel
      };

      try {
        const res = await callBaaS("savePlanAdelanto", { targetEmail: localProfileUser.correo, planData: input });
        showSectionAlert("planAlert", res.message, "success");
      } catch (err) {
        showSectionAlert("planAlert", err.message, "danger");
      } finally {
        btn.disabled = false;
        btn.textContent = "Actualizar Plan de Adelanto";
      }
    }

    let localRoverAssistancesList = [];

    async function loadHistoricalAssistances(email) {
      const tbody = document.getElementById("assistTableBody");
      if (!tbody) return;

      try {
        const res = await callBaaS("getRoverAssistances", { email: email });
        
        // Guard de SPA
        const currentTbody = document.getElementById("assistTableBody");
        if (!currentTbody) return;

        localRoverAssistancesList = res.data;
        currentTbody.innerHTML = "";

        if (res.data.length === 0) {
          currentTbody.innerHTML = `<tr><td colspan="6" class="text-center py-3 text-muted">No se registran asistencias para este usuario.</td></tr>`;
          return;
        }

        res.data.forEach(ast => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.onclick = () => openAssistanceModal(ast.id);
          tr.innerHTML = `
            <td>${ast.fecha}</td>
            <td><strong class="text-primary">${ast.reunionNombre}</strong></td>
            <td><span class="badge bg-secondary" style="font-size:0.75rem;">${ast.tipo.toUpperCase()}</span></td>
            <td>${ast.rutasTrabajadas}</td>
            <td class="text-truncate" style="max-width: 200px;">${ast.competenciasTrabajadas}</td>
            <td class="text-center fw-bold text-success">${ast.autoevaluacion} / 5</td>`;
          currentTbody.appendChild(tr);
        });
      } catch (err) {
        const currentTbody = document.getElementById("assistTableBody");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="6" class="text-center py-3 text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

                <div class="modal-body p-4">
                  <div class="row g-3">
                    <div class="col-md-6"><label class="form-label fw-semibold">Año</label><input type="number" class="form-control" id="pAnio" required></div>
                    <div class="col-md-6"><label class="form-label fw-semibold">Fecha Inicio</label><input type="date" class="form-control" id="pFechaIn" required></div>
                    <div class="col-12"><label class="form-label fw-semibold">Carpeta de Formatos (URL)</label><input type="url" class="form-control" id="pFormUrl" required></div>
                    <div class="col-12"><label class="form-label fw-semibold">Carpeta de Actas (URL)</label><input type="url" class="form-control" id="pActaUrl" required></div>
                  </div>
                </div>
                <div class="modal-footer bg-light"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-success" id="btnSubmitProgram">Guardar Programa</button></div>
              </form>
            </div>
          </div>
        </div>

        <!-- MODAL RUTA -->
        <div class="modal fade" id="modalRut" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-start border-0 shadow">
              <div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="modalRutaLabel">🗺️ Ruta</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
              <form id="formRut" onsubmit="saveRuta(event)">
                <div class="modal-body p-4">
                  <div class="mb-3"><label class="form-label fw-semibold">Nombre</label><input type="text" class="form-control" id="rNombre" required></div>
                  <div class="mb-3"><label class="form-label fw-semibold">Descripción</label><textarea class="form-control" id="rDesc" rows="2"></textarea></div>
                </div>
                <div class="modal-footer bg-light"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary" id="btnSubmitRuta">Guardar Ruta</button></div>
              </form>
            </div>
          </div>
        </div>

        <!-- MODAL COMPETENCIA -->
        <div class="modal fade" id="modalCmp" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-start border-0 shadow">
              <div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="modalCompLabel">⚜️ Competencia</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
              <form id="formCmp" onsubmit="saveCompetencia(event)">
                <div class="modal-body p-4">
                  <div class="mb-3"><label class="form-label fw-semibold">Nombre</label><input type="text" class="form-control" id="cNombre" required></div>
                  <div class="mb-3"><label class="form-label fw-semibold">Ruta Asociada</label><select class="form-select" id="cRuta" required></select></div>
                  <div class="mb-3"><label class="form-label fw-semibold">Descripción</label><textarea class="form-control" id="cDesc" rows="2"></textarea></div>
                  <div class="mb-3"><label class="form-label fw-semibold">Características (Lista por líneas)</label><textarea class="form-control" id="cCarac" rows="3"></textarea></div>
                </div>
                <div class="modal-footer bg-light"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary" id="btnSubmitComp">Guardar Competencia</button></div>
              </form>
            </div>
          </div>
        </div>

        <!-- MODAL PILAR -->
        <div class="modal fade" id="modalPil" tabindex="-1" aria-hidden="true">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-start border-0 shadow">
              <div class="modal-header bg-dark text-white"><h5 class="modal-title fw-bold" id="modalPilarLabel">🔥 Pilar</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
              <form id="formPil" onsubmit="savePilar(event)">
                <div class="modal-body p-4">
                  <div class="mb-3"><label class="form-label fw-semibold">Nombre</label><input type="text" class="form-control" id="pNombre" required></div>
                </div>
                <div class="modal-footer bg-light"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="submit" class="btn btn-primary" id="btnSubmitPilar">Guardar Pilar</button></div>
              </form>
            </div>
          </div>
        </div>`;

      // Cargar plantillas de Docs
      loadTemplatesConfig();
    }

    async function loadTemplatesConfig() {
      // Guard de protección de SPA para evitar lecturas sobre elementos nulos
      const fmt = document.getElementById("tmplFormato");
      if (!fmt) return;

      try {
        const res = await callBaaS("getSystemConfigs");
        document.getElementById("tmplFormato").value = res.data.templateFormatoUrl;
        document.getElementById("tmplActa").value = res.data.templateActaUrl;
      } catch (err) {
        showSectionAlert("templatesAlert", "Error: " + err.message, "danger");
      }
    }

    async function saveTemplates(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSaveTmpls");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      const configs = {
        templateFormatoUrl: document.getElementById("tmplFormato").value,
        templateActaUrl: document.getElementById("tmplActa").value
      };

      try {
        const res = await callBaaS("saveSystemConfigs", { configs: configs });
        showSectionAlert("templatesAlert", res.message, "success");
      } catch (err) {
        showSectionAlert("templatesAlert", err.message, "danger");
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar Enlaces";
      }
    }

    // Programas
    let localProgs = [];

    async function loadConfigPrograms() {
      const tbody = document.getElementById("tblConfigPrograms");
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>`;

      try {
        const res = await callBaaS("getPrograms");
        
        const currentTbody = document.getElementById("tblConfigPrograms");
        if (!currentTbody) return;

        localProgs = res.data;
        currentTbody.innerHTML = res.data.map(p => `
          <tr>
            <td><span class="badge bg-dark">${p.anio}</span></td>
            <td><strong>${p.fechaInicio}</strong></td>
            <td><a href="${p.carpetaFormatosUrl}" target="_blank" class="text-truncate d-inline-block small" style="max-width:200px;">${p.carpetaFormatosUrl}</a></td>
            <td><a href="${p.carpetaActasUrl}" target="_blank" class="text-truncate d-inline-block small" style="max-width:200px;">${p.carpetaActasUrl}</a></td>
            <td class="text-end"><button class="btn btn-outline-dark btn-sm" onclick="openEditProgramModal(${p.anio})">Editar</button></td>
          </tr>
        `).join("");
      } catch (err) {
        const currentTbody = document.getElementById("tblConfigPrograms");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="5" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

    function openCreateProgramModal() {
      isProgramEditing = false;
      document.getElementById("pAnio").value = new Date().getFullYear();
      document.getElementById("pAnio").readOnly = false;
      document.getElementById("pFechaIn").value = "";
      document.getElementById("pFormUrl").value = "";
      document.getElementById("pActaUrl").value = "";

      const modalProgram = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalProg"));
      modalProgram.show();
    }

    function openEditProgramModal(year) {
      const p = localProgs.find(prog => prog.anio === year);
      if (!p) return;
      isProgramEditing = true;
      document.getElementById("pAnio").value = p.anio;
      document.getElementById("pAnio").readOnly = true;
      document.getElementById("pFechaIn").value = p.fechaInicio;
      document.getElementById("pFormUrl").value = p.carpetaFormatosUrl;
      document.getElementById("pActaUrl").value = p.carpetaActasUrl;

      const modalProgram = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalProg"));
      modalProgram.show();
    }

    async function saveProgram(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmitProgram");
      btn.disabled = true;
      btn.textContent = "Guardando...";

      const input = {
        anio: document.getElementById("pAnio").value,
        fechaInicio: document.getElementById("pFechaIn").value,
        carpetaFormatosUrl: document.getElementById("pFormUrl").value,
        carpetaActasUrl: document.getElementById("pActaUrl").value
      };

      try {
        const res = await callBaaS("saveProgram", { programInput: input });
        
        const modalProgram = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalProg"));
        modalProgram.hide();
        loadConfigPrograms();
        showSectionAlert("progsAlert", res.message, "success");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Guardar Programa";
      }
    }

    // Rutas
    let localRutasConfig = [];

    async function loadConfigRutas() {
      const tbody = document.getElementById("tblConfigRutas");
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="3" class="text-center text-muted">Cargando...</td></tr>`;

      try {
        const res = await callBaaS("getRutasYCompetencias");
        
        const currentTbody = document.getElementById("tblConfigRutas");
        if (!currentTbody) return;

        localRutasConfig = res.rutas;
        currentTbody.innerHTML = res.rutas.map(r => `
          <tr>
            <td><strong>${r.nombre}</strong></td>
            <td class="text-muted small">${r.descripcion}</td>
            <td class="text-end">
              <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-dark btn-sm" onclick="openEditRutaModal('${r.nombre}')">Editar</button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteRuta('${r.nombre}')">Eliminar</button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        const currentTbody = document.getElementById("tblConfigRutas");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

    function openCreateRutaModal() {
      isRutaEditing = false;
      document.getElementById("rNombre").value = "";
      document.getElementById("rNombre").readOnly = false;
      document.getElementById("rDesc").value = "";

      const modalRuta = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalRut"));
      modalRuta.show();
    }

    function openEditRutaModal(name) {
      const r = localRutasConfig.find(ruta => ruta.nombre === name);
      if (!r) return;
      isRutaEditing = true;
      document.getElementById("rNombre").value = r.nombre;
      document.getElementById("rNombre").readOnly = true;
      document.getElementById("rDesc").value = r.descripcion;

      const modalRuta = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalRut"));
      modalRuta.show();
    }

    async function saveRuta(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmitRuta");
      btn.disabled = true;

      const input = {
        nombre: document.getElementById("rNombre").value.trim(),
        descripcion: document.getElementById("rDesc").value.trim()
      };

      try {
        const res = await callBaaS("saveRuta", { rutaInput: input });
        
        const modalRuta = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalRut"));
        modalRuta.hide();
        loadConfigRutas();
        showSectionAlert("rutasAlert", res.message, "success");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteRuta(nombre) {
      if (confirm("¿Deseas eliminar la ruta: " + nombre + "?")) {
        try {
          const res = await callBaaS("deleteRuta", { nombre: nombre });
          showSectionAlert("rutasAlert", res.message, "success");
          loadConfigRutas();
        } catch (err) {
          showSectionAlert("rutasAlert", "Fallo: " + err.message, "danger");
        }
      }
    }

    // Competencias
    let localCompsConfig = [];

    async function loadConfigComps() {
      const tbody = document.getElementById("tblConfigComps");
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>`;

      try {
        const res = await callBaaS("getRutasYCompetencias");
        
        const currentTbody = document.getElementById("tblConfigComps");
        if (!currentTbody) return;

        localCompsConfig = res.competencias;
        currentTbody.innerHTML = res.competencias.map(c => `
          <tr>
            <td><strong>${c.nombre}</strong></td>
            <td><span class="badge bg-info text-dark">${c.ruta}</span></td>
            <td>
              <div class="small fw-semibold text-dark">${c.descripcion}</div>
              <div class="small text-muted py-1 bg-light px-2 rounded mt-1" style="white-space:pre-wrap; font-size:0.8rem;">${c.caracteristicas}</div>
            </td>
            <td class="text-end">
              <div class="d-flex gap-2 justify-content-end">
                <button class="btn btn-outline-dark btn-sm" onclick="openEditCompModal('${c.nombre}')">Editar</button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteComp('${c.nombre}')">Eliminar</button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        const currentTbody = document.getElementById("tblConfigComps");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

    function openCreateCompModal() {
      isCompEditing = false;
      document.getElementById("cNombre").value = "";
      document.getElementById("cNombre").readOnly = false;
      document.getElementById("cDesc").value = "";
      document.getElementById("cCarac").value = "";

      // Rutas
      const select = document.getElementById("cRuta");
      select.innerHTML = localRutasConfig.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join("");
      
      const modalComp = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalCmp"));
      modalComp.show();
    }

    function openEditCompModal(name) {
      const c = localCompsConfig.find(comp => comp.nombre === name);
      if (!c) return;

      isCompEditing = true;
      document.getElementById("cNombre").value = c.nombre;
      document.getElementById("cNombre").readOnly = true;
      document.getElementById("cDesc").value = c.descripcion;
      document.getElementById("cCarac").value = c.caracteristicas;

      const select = document.getElementById("cRuta");
      select.innerHTML = localRutasConfig.map(r => `<option value="${r.nombre}" ${r.nombre === c.ruta ? "selected" : ""}>${r.nombre}</option>`).join("");
      
      const modalComp = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalCmp"));
      modalComp.show();
    }

    async function saveCompetencia(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmitComp");
      btn.disabled = true;

      const input = {
        nombre: document.getElementById("cNombre").value.trim(),
        ruta: document.getElementById("cRuta").value,
        descripcion: document.getElementById("cDesc").value.trim(),
        caracteristicas: document.getElementById("cCarac").value.trim()
      };

      try {
        const res = await callBaaS("saveCompetencia", { compInput: input });
        
        const modalComp = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalCmp"));
        modalComp.hide();
        loadConfigComps();
        showSectionAlert("compsAlert", res.message, "success");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteComp(nombre) {
      if (confirm("¿Deseas eliminar la competencia: " + nombre + "?")) {
        try {
          const res = await callBaaS("deleteCompetencia", { nombre: nombre });
          showSectionAlert("compsAlert", res.message, "success");
          loadConfigComps();
        } catch (err) {
          showSectionAlert("compsAlert", err.message, "danger");
        }
      }
    }

    // Pilares
    async function loadConfigPilares() {
      const tbody = document.getElementById("tblConfigPilares");
      if (!tbody) return;

      tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted">Cargando...</td></tr>`;

      try {
        const res = await callBaaS("getPilares");
        
        const currentTbody = document.getElementById("tblConfigPilares");
        if (!currentTbody) return;

        currentTbody.innerHTML = res.data.map(p => `
          <tr>
            <td><strong>${p}</strong></td>
            <td class="text-end">
              <button class="btn btn-outline-danger btn-sm" onclick="deletePilar('${p}')">Eliminar</button>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        const currentTbody = document.getElementById("tblConfigPilares");
        if (currentTbody) {
          currentTbody.innerHTML = `<tr><td colspan="2" class="text-center text-danger">Error: ${err.message}</td></tr>`;
        }
      }
    }

    function openCreatePilarModal() {
      document.getElementById("pNombre").value = "";
      
      const modalPilar = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalPil"));
      modalPilar.show();
    }

    async function savePilar(e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmitPilar");
      btn.disabled = true;

      const input = { nombre: document.getElementById("pNombre").value.trim() };
      try {
        const res = await callBaaS("savePilar", { pilarInput: input });
        
        const modalPilar = bootstrap.Modal.getOrCreateInstance(document.getElementById("modalPil"));
        modalPilar.hide();
        loadConfigPilares();
        showSectionAlert("pilaresAlert", res.message, "success");
      } catch (err) {
        alert("Error: " + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function deletePilar(nombre) {
      if (confirm("¿Deseas eliminar el pilar: " + nombre + "?")) {
        try {
          const res = await callBaaS("deletePilar", { nombre: nombre });
          showSectionAlert("pilaresAlert", res.message, "success");
          loadConfigPilares();
        } catch (err) {
          showSectionAlert("pilaresAlert", err.message, "danger");
        }
      }
    }
  </script>
</body>
</html>
